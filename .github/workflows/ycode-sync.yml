# Sincroniza o export estático do ycode com os portais do cxclube-beta.
# SLUGS = pares "slug-no-studio:slug-em-producao" (destino = public/viagens/<destino>/).
# machu mantém o sufixo -v2 (slug permanente da experiência Studio);
# portais novos nascem sem sufixo.
name: ycode-sync
on:
  repository_dispatch:
    types: [ycode-export]
  workflow_dispatch: {}

env:
  SLUGS: "machu-picchu-e-cusco:machu-picchu-e-cusco-v2 consfit-2026-suica:consfit-2026-suica-v2"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout export
        uses: actions/checkout@v4
        with:
          ref: ycode-export
          path: export

      - name: Checkout cxclube-beta
        uses: actions/checkout@v4
        with:
          repository: onmx-tech/cxclube-beta
          token: ${{ secrets.CXCLUBE_BETA_TOKEN }}
          path: beta

      - name: Sync portais
        run: |
          set -euo pipefail
          for pair in $SLUGS; do
            slug="${pair%%:*}"
            destslug="${pair##*:}"
            src="export/$slug"
            [ -d "$src" ] || { echo "skip $slug (sem export)"; continue; }
            dest="beta/public/viagens/${destslug}"
            # preserva o apresentar.html (casca do modo Apresentar — não vem do export)
            apresentar=""
            [ -f "$dest/apresentar.html" ] && apresentar="$(mktemp)" && cp "$dest/apresentar.html" "$apresentar"
            rm -rf "$dest" && mkdir -p "$dest"
            cp -R "$src/." "$dest/"
            if [ -n "$apresentar" ]; then cp "$apresentar" "$dest/apresentar.html"; fi
            # assets ficam ABSOLUTOS em /a/ na raiz (nada de reescrever paths:
            # sed em /a/ quebra os seletores Tailwind escapados \/a\/ do CSS)
            [ -d export/a ] && mkdir -p beta/public/a && cp -R export/a/. beta/public/a/
            # src/srcset relativos ../a/ quebram no iframe do apresentar (index.html explícito) — absolutiza
            find "$dest" -name "*.html" -exec sed -i 's|\.\./a/|/a/|g' {} +
            # review widget (só ativa com ?review=<slug>)
            sed -i 's|</body>|<script src="/review.js"></script></body>|' "$dest/index.html"
          done

      - name: Commit no cxclube-beta
        run: |
          cd beta
          git config user.name "ycode-sync"
          git config user.email "hello@merinno.com"
          git add public/viagens public/a
          git diff --cached --quiet && { echo "nada a sincronizar"; exit 0; }
          git commit -m "chore(ycode-sync): portais @ ${GITHUB_SHA::7}"
          # main pode ter andado durante a run — rebase e tenta de novo
          for i in 1 2 3; do
            git push && break
            git pull --rebase origin main
          done
